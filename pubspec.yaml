name: employee_management
description: A complete Flutter Employee Management System with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.1
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/